version: 2

models:
  - name: dim_supplier
    description: >
      The "Supplier" dimension, grain (supplier_name, supplier_abn) as stated on
      the contract. The abr_* columns carry what the Australian Business Register
      says about the stated ABN, so a stated ABN that is not the supplier's can be
      seen rather than silently trusted.
    columns:
      - name: supplier_key
        description: "Surrogate PK."
        data_tests: [not_null, unique]
      - name: supplier_name
        data_tests: [not_null]
      - name: abr_entity_name
        description: "The entity the register says the stated ABN belongs to.
          NULL when the supplier has no ABN, or the ABN was never issued."
      - name: abr_entity_type
        description: "Registered entity type in words, e.g. 'Australian Private
          Company', 'Commonwealth Government Entity'."
      - name: abr_abn_status
        description: "ACT or CAN in the register. 37% of these ABNs have been
          cancelled since the contracts were published."
        data_tests:
          - accepted_values:
              arguments:
                values: ['ACT', 'CAN']
              config:
                severity: error
      - name: supplier_abn_is_placeholder
        description: "True when the stated ABN belongs to a government body that
          is not this supplier — an agency's own ABN standing in for a real one.
          Exclude these rows before aggregating by ABN."
        data_tests:
          - not_null

  - name: dim_agency
    description: "The \"Government buyer\" dimension."
    columns:
      - name: agency_key
        description: "Surrogate PK."
        data_tests: [not_null, unique]
      - name: agency_name
        data_tests: [not_null]

  - name: dim_category
    description: "The \"Procurement category (UNSPSC)\" dimension."
    columns:
      - name: category_key
        description: "Surrogate PK."
        data_tests: [not_null, unique]

  - name: dim_date
    description: "The calendar dimension."
    columns:
      - name: date_key
        description: "Surrogate PK in YYYYMMDD form."
        data_tests: [not_null, unique]

  - name: fct_contracts
    description: >
      The "Contract" fact. Grain: one row per contract, holding its latest
      version. AusTender publishes amendments as separate notices
      (413292, 413292-A1, 413292-A2); each chain is collapsed to its latest
      amendment, since carrying every notice triple-counts amended contracts.
    columns:
      - name: contract_id
        description: "The contract (base notice id) — degenerate dimension and PK
          of the fact. Not the notice id: see source_notice_id."
        data_tests: [not_null, unique]
      - name: source_notice_id
        description: "The AusTender notice this row is sourced from, e.g.
          413292-A2. Unique, since one notice can win for only one contract."
        data_tests: [not_null, unique]
      - name: amendment_no
        description: "How many amendments deep this version is; 0 for a contract
          that was never amended."
        data_tests:
          - not_null
      - name: contract_value
        description: "Contract value."
        data_tests:
          - not_null
      - name: supplier_key
        description: "FK → dim_supplier."
        data_tests:
          # dbt >= 1.10: generic-test arguments nest under `arguments`.
          - relationships:
              arguments:
                to: ref('dim_supplier')
                field: supplier_key
      - name: agency_key
        description: "FK → dim_agency."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_agency')
                field: agency_key
      - name: category_key
        description: "FK → dim_category."
        data_tests:
          - not_null
      - name: publish_date_key
        description: "FK → dim_date (YYYYMMDD). Guards the calendar spine: if the
          fact ever produces a date outside dim_date's fixed range, this fails."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: loaded_at
        description: "Ingestion timestamp carried from Silver. Drives the
          incremental high-water mark; must never be null or the row could not
          be picked up by a later run."
        data_tests:
          - not_null
