version: 2

sources:
  - name: bronze
    database: austender_db
    schema: bronze
    description: "Raw layer — AusTender data loaded as-is by the Python loader."
    tables:
      - name: raw_contract_data
        description: "Raw Australian federal contracts (CSV, 15 columns)."
        # Freshness keys off _loaded_at (our ingestion time), NOT publishdate.
        # This is deliberate: publishdate is a per-contract business date frozen
        # at 2011-11-11, so a freshness check on it would be permanently stale and
        # meaningless. _loaded_at monitors what is actually actionable for a batch
        # source — whether ingestion has run recently. A live feed would instead
        # key off the feed's own extract timestamp.
        # dbt >= 1.10: loaded_at_field and freshness live under config.
        config:
          loaded_at_field: _loaded_at
          freshness:
            warn_after: {count: 30, period: day}
            error_after: {count: 90, period: day}
        columns:
          - name: cnid
            description: "Contract Notice ID — the natural key of a contract."
          - name: value
            description: "Contract value (string in the source; needs a CAST)."
