version: 2

models:
  - name: rpt_contracts
    description: >
      Base reporting view, one row per contract, with the supplier resolved to
      its real entity and is_attributable computed. The consumption layer builds
      on this so every report applies the same caveats.


      Governance: supplier_abn carries a Dynamic Data Masking policy
      (mart.mask_supplier_abn) applied by a post_hook — the engineer role sees the
      raw ABN, every other role (the BI analyst) sees it partially masked. AusTender
      is public data, so this demonstrates the masking mechanism; the same policy
      would protect real PII (SSN, DOB, diagnoses) in a regulated setting.
    columns:
      - name: contract_id
        data_tests: [not_null, unique]
      - name: supplier_abn
        description: "Supplier ABN. Masked by mart.mask_supplier_abn: raw for the
          engineer role, partially masked (XXXXXXXX + last 3 digits) for the analyst.
          Applied via a post_hook so it survives each rebuild; skipped on CI."
      - name: is_attributable
        description: "True when the contract value can be attributed to a named
          supplier: the ABN is not an agency placeholder and the supplier is not
          a known non-company channel (FMS, travel panels)."
        data_tests:
          - not_null
      - name: is_active
        description: "True if the contract has started and not yet ended as of the
          run date. Answers 'which contracts are active now?' without the raw star."
        data_tests:
          - not_null
      - name: contract_value
        data_tests: [not_null]

  - name: rpt_supplier_spend
    description: "Spend per real supplier (one row per supplier entity), carrying
      total_spend and attributable_spend."
    columns:
      - name: supplier_entity_key
        data_tests: [not_null, unique]
      - name: total_spend
        description: "All contract value grouped to this supplier entity."
        data_tests: [not_null]
      - name: attributable_spend
        description: "The subset of total_spend on attributable contracts (real
          named supplier, not a placeholder ABN or a non-company channel). Use this
          for supplier league tables; total_spend for coverage."

  - name: rpt_agency_spend
    description: "Spend per agency per year, carrying total_spend and attributable_spend."
    columns:
      - name: total_spend
        description: "All contract value for the agency in the year."
        data_tests: [not_null]
      - name: attributable_spend
        description: "The subset attributable to a real named supplier."

  - name: rpt_category_spend
    description: "Spend per procurement category (UNSPSC) per year, both measures."
    columns:
      - name: total_spend
        description: "All contract value in the category-year."
        data_tests: [not_null]
      - name: attributable_spend
        description: "The subset attributable to a real named supplier."

  - name: rpt_bi_dim_agency
    description: "Agency dimension for the Power BI star (mart view over dim_agency,
      so the analyst/BI role can build a star without reading GOLD)."
    columns:
      - name: agency_key
        description: "Surrogate PK; relates to rpt_contracts.agency_key."
        data_tests: [not_null, unique]

  - name: rpt_bi_dim_category
    description: "Procurement-category (UNSPSC) dimension for the Power BI star."
    columns:
      - name: category_key
        description: "Surrogate PK; relates to rpt_contracts.category_key."
        data_tests: [not_null, unique]

  - name: rpt_bi_dim_supplier
    description: "Supplier dimension for the Power BI star, rolled up to the real
      supplier entity (supplier_entity_key). Relates to rpt_contracts.supplier_entity_key."
    columns:
      - name: supplier_entity_key
        description: "Surrogate PK at supplier-entity grain."
        data_tests: [not_null, unique]

  - name: rpt_bi_dim_date
    description: "Calendar dimension for the Power BI star; mark as the model's Date
      table for time intelligence. Relates to rpt_contracts.publish_date on full_date."
    columns:
      - name: date_key
        description: "Surrogate PK (YYYYMMDD)."
        data_tests: [not_null, unique]
      - name: full_date
        description: "The calendar date; the relationship key from the fact's publish_date."
        data_tests: [not_null, unique]

  - name: rpt_supplier_history
    description: >
      SCD2 history of the supplier dimension (from the supplier_history
      snapshot). One row per version of a supplier's register-sourced attributes;
      is_current marks the live version, valid_from/valid_to bound each. Empty
      until `dbt snapshot` has run.
    columns:
      - name: is_current
        data_tests: [not_null]
