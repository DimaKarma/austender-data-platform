# Copy to ~/.dbt/profiles.yml and fill in the credentials.
# Values can be pulled from the environment via "{{ env_var('SNOWFLAKE_ACCOUNT') }}".
# Note: bootstrap.py generates austender_project/profiles.yml from ingestion/.env,
# so this template is only needed for the manual setup path and for CI.
# Default target is `ci` so sqlfluff's dbt templater (which uses the default
# target) can compile in CI, where the ci key-pair creds are present. Every dbt
# command passes --target explicitly, so this default only affects sqlfluff.
# (bootstrap.py generates a separate local profiles.yml whose default is dev.)
austender:
  target: ci
  outputs:
    # Defaults on the dev env_vars so this file parses in CI, which only sets the
    # ci-target vars: dbt renders every output when it loads the profile, so a
    # bare env_var('SNOWFLAKE_USER') here would fail a CI run that has no password.
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER', '') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD', '') }}"
      role: AUSTENDER_DE
      warehouse: AUSTENDER_WH
      database: AUSTENDER_DB
      schema: silver          # base schema; overridden in dbt_project.yml
      threads: 4
      client_session_keep_alive: False
    # CI authenticates as a dedicated service user with key-pair auth, not a
    # password. Env-var defaults so the profile also parses in the deploy job,
    # which sets only the deploy-target vars (dbt renders every output on load).
    ci:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_CI_USER', '') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_CI_PRIVATE_KEY_PATH', '') }}"
      role: AUSTENDER_CI
      warehouse: AUSTENDER_CI_WH
      database: AUSTENDER_DB
      schema: silver
      threads: 4
    # Manual deploy to the prod schemas (BRONZE/SILVER/GOLD/MART — the
    # generate_schema_name macro only prefixes CI_ on the ci target). Runs from the
    # deploy-only workflow_dispatch button as a SEPARATE service user with prod
    # write, so the CI service user stays least-privilege (bronze-read only).
    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_DEPLOY_USER', '') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_DEPLOY_PRIVATE_KEY_PATH', '') }}"
      role: AUSTENDER_DE
      warehouse: AUSTENDER_WH
      database: AUSTENDER_DB
      schema: silver
      threads: 4
