name: dbt CI

# CI: run dbt build (run + test) on every PR and push, into isolated CI_* schemas.
# Deployment to the prod schemas is manual (dev target) — no auto-CD by design.
# Keeps data tests in the pipeline rather than as a manual step.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# All CI runs share the CI_SILVER/CI_GOLD/CI_MART schemas, so serialize them:
# two concurrent runs would clobber each other's throwaway build. Queue rather
# than cancel — let an in-progress build finish.
concurrency:
  group: dbt-ci-shared-schemas
  cancel-in-progress: false

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: austender_project
    # CI authenticates as a dedicated service user (austender_ci_svc) with
    # key-pair auth — no human's password reaches CI. See profiles.example.yml.
    env:
      SNOWFLAKE_ACCOUNT:             ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_CI_USER:             ${{ secrets.SNOWFLAKE_CI_USER }}
      SNOWFLAKE_CI_PRIVATE_KEY_PATH: ${{ github.workspace }}/ci_rsa_key.p8
      DBT_PROFILES_DIR:              ${{ github.workspace }}/austender_project
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Write Snowflake private key
        # The secret holds the PKCS#8 key base64-encoded, so newlines survive.
        run: echo "${{ secrets.SNOWFLAKE_CI_PRIVATE_KEY }}" | base64 -d > "$SNOWFLAKE_CI_PRIVATE_KEY_PATH"

      - name: Render CI profiles.yml
        run: cp profiles.example.yml profiles.yml

      - name: dbt deps
        run: dbt deps

      - name: dbt source freshness
        # Exercises the freshness config (was declared but never run).
        # Non-blocking: a stale static extract shouldn't fail the build.
        run: dbt source freshness --target ci || true

      - name: dbt build (run + test)
        run: dbt build --target ci

      - name: dbt docs generate
        run: dbt docs generate --target ci
